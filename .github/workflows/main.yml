name: TeleDrive Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-tauri-windows:
    name: Build Tauri (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tg-drive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tg-drive/package-lock.json

      - name: Install Rust stable (MSVC toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (tsc + vite)
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload Windows installer (.msi)
        uses: actions/upload-artifact@v4
        with:
          name: teledrive-windows-msi
          path: tg-drive/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Windows NSIS installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: teledrive-windows-exe
          path: tg-drive/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  build-flutter-apk:
    name: Build Flutter APK (Android)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tg_drive_mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

      - name: Build debug APK
        run: flutter build apk --debug --dart-define=API_ID=${{ secrets.API_ID }} --dart-define=API_HASH=${{ secrets.API_HASH }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/tele_drive.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tele_drive-apk
          path: tg_drive_mobile/build/app/outputs/flutter-apk/tele_drive.apk
          if-no-files-found: error

      - name: Build release APK (unsigned)
        run: flutter build apk --release --dart-define=API_ID=${{ secrets.API_ID }} --dart-define=API_HASH=${{ secrets.API_HASH }}

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: tele_drive-release-apk
          path: tg_drive_mobile/build/app/outputs/flutter-apk/app-release-unsigned.apk
          if-no-files-found: warn
